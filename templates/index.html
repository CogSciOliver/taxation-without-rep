{% extends "base.html" %}
{% block content %}

<h1>Bank CSV → P&L + Tax Flags (Prototype v0.2.0)</h1>

<div class="card">
  <form action="/upload" method="post" enctype="multipart/form-data">
    <label>Entity mode</label>
    <select name="entity_mode">
      <option value="schedule_c">Sole prop / SMLLC (Schedule C)</option>
      <option value="partnership_llc">Partnership / MMLLC (Form 1065)</option>
      <option value="s_corp">S-Corp (Form 1120-S)</option>
      <option value="exempt_501c3">501(c)(3) exempt org (Form 990 series)</option>
      <option value="exempt_501d">501(d) religious/apostolic (Form 1065 + K-1)</option>
    </select>
    <small>Prototype: this changes checklist + labeling, not legal conclusions.</small>

    <label>Upload bank CSV</label>
    <input type="file" name="file" accept=".csv" required />

    <div style="margin-top:14px;">
      <button type="submit">Upload & Analyze</button>
    </div>
  </form>
</div>

<h3 style="margin-top:300px;">IRS sources used for the “Updates” panel</h3>
<ul>
  {% for s in sources %}
  <li><a href="{{ s }}" target="_blank">{{ s }}</a></li>
  {% endfor %}
</ul>

{% endblock %}
